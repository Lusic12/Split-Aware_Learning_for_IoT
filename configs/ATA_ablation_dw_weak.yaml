# Ablation: Weak alignment weight (dw=0.1)
task_type: binary

data_config:
  train_data_path: /home/user/son/IPv6_detect_attack_by_AI/dataset1/multiclass/80/train.csv
  val_data_path: /home/user/son/IPv6_detect_attack_by_AI/dataset1/multiclass/80/val.csv
  test_data_path: /home/user/son/IPv6_detect_attack_by_AI/dataset1/multiclass/80/test.csv

  time_col: time
  label_col: label
  feature_cols: null
  load_mode: time_series
  split_method: tdc
  num_domains: 3

  normalize: true
  train_shuffle: true
  batch_size: 256

model_config:
  model_type: adarnn
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  use_bottleneck: true
  bottleneck_dim: 64
  seq_len: 1
  loss_type: mmd

train_config:
  output_dir: ./outputs/ata_model
  n_epochs: 20
  optimizer: adamw
  lr: 0.001
  weight_decay: 1.0e-4
  early_stop: 20
  dw: 0.1
  len_win: 0
  seed: 42

  use_class_weights: false
  attack_weight: 3.0

notes:
  - Ablation: Weak adaptation (dw=0.1)
